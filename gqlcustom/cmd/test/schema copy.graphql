scalar Uint

scalar Uint64

scalar Custom

scalar Time

scalar Password

type AiModel implements Node {
  id: ID!
  createdAt: Time
  updatedAt: Time
  name: String
  providerName: String!
  modelID: String!
  baseURL: String
  apiKey: Password
  orgID: String
  descr: String
}

"A connection to a list of items."
type AiModelConnection {
  "A list of edges."
  edges: [AiModelEdge]
  "Identifies the total count of items in the connection."
  totalCount: Int!
}

"An edge in a connection."
type AiModelEdge {
  "The item at the end of the edge."
  node: AiModel
}

interface Node {
  "The id of the object."
  id: ID!
}