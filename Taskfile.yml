# https://taskfile.dev

version: "3"

tasks:
  # gqlsdl tasks
  gqlsdl:run:
    desc: Run gqlsdl module
    dir: ./gqlsdl
    cmds:
      - go run .

  gqlsdl:build:
    desc: Build gqlsdl module
    dir: ./gqlsdl
    cmds:
      - go build -o ../bin/gqlsdl .

  # gqlgenapi tasks (gqlgen-based test GraphQL API)
  gqlgenapi:run:
    desc: Run gqlgenapi GraphQL server
    dir: ./gqlgenapi
    cmds:
      - go run ./server.go

  gqlgenapi:build:
    desc: Build gqlgenapi server binary
    dir: ./gqlgenapi
    cmds:
      - go build -o ../bin/gqlgenapi ./server.go

  gqlgenapi:generate:
    desc: Regenerate gqlgen code for gqlgenapi (uses GOWORK=off)
    dir: ./gqlgenapi
    cmds:
      - GOWORK=off go run github.com/99designs/gqlgen@v0.17.87 generate

  # gqlsdk tasks
  gqlsdk:run:
    desc: Run gqlsdk module
    dir: ./gqlsdk
    cmds:
      - go run .

  gqlsdk:build:
    desc: Build gqlsdk module
    dir: ./gqlsdk
    cmds:
      - go build -o ../bin/gqlsdk .

  # Workspace tasks
  build:
    desc: Build all modules
    cmds:
      - mkdir -p bin
      - task: gqlsdl:build
      - task: gqlgenapi:build
      - task: gqlsdk:build

  tidy:
    desc: Run go mod tidy on all modules
    cmds:
      - |
        set -ex
        for d in $(sed -n '/^use *(/,/^)/p' go.work | tail -n +2 | sed '$d' | sed 's/^[ \t]*//; s/[ \t]*$//'); do
          echo ">> Tidying '$d'"
          (cd "$d" && go mod tidy)
        done

  upgrade:
    desc: Update all go modules in go.work
    cmds:
      - |
        set -ex
        for d in $(sed -n '/^use *(/,/^)/p' go.work | tail -n +2 | sed '$d' | sed 's/^[ \t]*//; s/[ \t]*$//'); do
          echo ">> Updating '$d'"
          (cd "$d" && go get -u ./... && go mod tidy)
        done

  # sdkexample_gqlgenapi tasks (SDK generated from gqlgenapi)
  sdkexample_gqlgenapi:fetch-schema:
    desc: Fetch schema from gqlgenapi into sdkexample_gqlgenapi via gqlsdl
    dir: .
    cmds:
      - go run ./gqlsdl -url http://localhost:8081/query -output sdkexample_gqlgenapi/cmd/generate/schema.graphql

  sdkexample_gqlgenapi:generate:
    desc: Generate SDK for gqlgenapi schema
    dir: ./sdkexample_gqlgenapi
    cmds:
      - go run ./cmd/generate

  sdkexample_gqlgenapi:run:
    desc: Run sample that calls gqlgenapi ping through generated SDK
    dir: ./sdkexample_gqlgenapi
    cmds:
      - go run ./cmd/samples

