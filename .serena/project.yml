project_root: .
language_server:
  language: go
  command: gopls
  args: []

project_description: |
  GraphQL Client Go Workspace - Contains multiple Go modules for working with GraphQL:
  - gqlsdk: GraphQL SDK with schema parsing using gqlparser
  - gqlsdl: GraphQL SDL utilities

paths_to_include:
  - "**/*.go"
  - "**/*.graphql"
  - "**/go.mod"
  - "**/go.sum"

paths_to_exclude:
  - "vendor/**"
  - ".git/**"

read_only: false
